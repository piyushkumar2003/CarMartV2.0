<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Flight</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <h1>Add Flight</h1>
    <form action="#" th:action="@{/add-flight}" th:object="${flight}" method="post">
        <label>Flight Number</label>
        <input type="text" th:field="*{flightNumber}" required>

        <label>Airline Name</label>
        <input type="text" th:field="*{airlineName}" required>

        <label>Source</label>
        <input type="text" th:field="*{source}" required>

        <label>Destination</label>
        <input type="text" th:field="*{destination}" required>

        <label>Date (YYYY-MM-DD)</label>
        <input type="text" th:field="*{dateOfJourney}" required>

        <label>Total Seats</label>
        <input type="number" th:field="*{totalSeats}" required>

        <label>Price</label>
        <input type="number" step="0.01" th:field="*{price}" required>

        <button type="submit" class="btn">Save Flight</button>
    </form>
    <a href="/all-flights">Back to List</a>
</body>

</html>

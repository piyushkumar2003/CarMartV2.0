<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Profile</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 20px auto;
        }

        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .profile-avatar {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .profile-name {
            font-size: 1.5em;
            color: #333;
            margin: 0;
        }

        .profile-username {
            color: #666;
            margin-top: 5px;
        }

        .profile-details {
            margin-top: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .detail-value.empty {
            color: #999;
            font-style: italic;
        }

        .action-buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #007bff 0%, #6610f2 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            color: #007bff;
            text-decoration: none;
            margin-right: 20px;
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <div class="nav-links">
            <a href="/passenger-dashboard">← Dashboard</a>
            <a href="/frequent-travelers">My Travelers</a>
        </div>

        <h1>👤 My Profile</h1>

        <!-- Success Message -->
        <div th:if="${param.updated}" class="success-message">
            ✅ Profile updated successfully!
        </div>

        <div class="profile-card">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h2 class="profile-name" th:text="${passenger.fullName} ?: 'Not Set'">John Doe</h2>
                <p class="profile-username">@<span th:text="${username}">username</span></p>
            </div>

            <!-- Profile Details -->
            <div class="profile-details">
                <div class="detail-row">
                    <span class="detail-label">📧 Email</span>
                    <span class="detail-value" th:class="${passenger.email} ? 'detail-value' : 'detail-value empty'"
                        th:text="${passenger.email} ?: 'Not provided'">email@example.com</span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">📞 Phone</span>
                    <span class="detail-value" th:class="${passenger.phone} ? 'detail-value' : 'detail-value empty'"
                        th:text="${passenger.phone} ?: 'Not provided'">+1234567890</span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">🎂 Date of Birth</span>
                    <span class="detail-value"
                        th:class="${passenger.dateOfBirth} ? 'detail-value' : 'detail-value empty'"
                        th:text="${passenger.dateOfBirth} ?: 'Not provided'">1990-01-01</span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">⚧ Gender</span>
                    <span class="detail-value" th:class="${passenger.gender} ? 'detail-value' : 'detail-value empty'"
                        th:text="${passenger.gender} ?: 'Not provided'">Male</span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">📍 Address</span>
                    <span class="detail-value" th:class="${passenger.address} ? 'detail-value' : 'detail-value empty'"
                        th:text="${passenger.address} ?: 'Not provided'">123 Main St</span>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="/edit-profile" class="btn btn-primary">✏️ Edit Profile</a>
                <a href="/frequent-travelers" class="btn btn-secondary">👥 Manage Travelers</a>
            </div>
        </div>
    </div>
</body>

</html>

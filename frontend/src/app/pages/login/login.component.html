<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">Login</h3>
                        <p class="text-muted">Welcome back! Please login to continue.</p>
                    </div>

                    <div *ngIf="error" class="alert alert-danger">{{error}}</div>

                    <form (ngSubmit)="login()">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" class="form-control" name="username" [(ngModel)]="credentials.username"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" name="password"
                                [(ngModel)]="credentials.password" required>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary rounded-pill fw-bold">Login</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <small class="text-muted">Don't have an account? <a routerLink="/register"
                                class="text-primary fw-bold text-decoration-none">Register</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
